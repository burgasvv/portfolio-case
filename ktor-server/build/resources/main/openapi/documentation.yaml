openapi: "3.1.0"
info:
  title: "portfolio_case API"
  description: "portfolio_case API"
  version: "1.0.0"
servers:
  - url: "http://localhost:9000"
paths:
  /api/v1/security/login:
    post:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "You already logged in"
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExceptionResponse"
  /api/v1/security/logout:
    post:
      description: ""
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "You successfully logged out"
  /api/v1/documents/by-id:
    get:
      description: ""
      parameters:
        - name: "documentId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            text/plain:
              schema:
                type: "string"
                format: "byte"
  /api/v1/videos/by-id:
    get:
      description: ""
      parameters:
        - name: "videoId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            text/plain:
              schema:
                type: "string"
                format: "byte"
  /api/v1/identities:
    get:
      description: ""
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/IdentityResponse"
  /api/v1/identities/by-id:
    get:
      description: ""
      parameters:
        - name: "identityId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IdentityResponse"
  /api/v1/identities/change-password:
    put:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRequest"
        required: true
      responses:
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExceptionResponse"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/identities/change-status:
    put:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRequest"
        required: true
      responses:
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExceptionResponse"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/identities/create:
    post:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IdentityResponse"
  /api/v1/identities/create-admin:
    post:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IdentityResponse"
  /api/v1/identities/delete:
    post:
      description: ""
      parameters:
        - name: "identityId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "302":
          description: "Found <br> Redirect"
          content:
            text/plain:
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "/api/v1/security/logout"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/identities/remove-image:
    delete:
      description: ""
      parameters:
        - name: "identityId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExceptionResponse"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/identities/update:
    put:
      description: ""
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdentityRequest"
        required: true
      responses:
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/IdentityResponse"
  /api/v1/identities/upload-image:
    post:
      description: ""
      parameters:
        - name: "identityId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ExceptionResponse"
        "200":
          description: "OK"
          content:
            '*/*':
              schema:
                type: "object"
  /api/v1/images/by-id:
    get:
      description: ""
      parameters:
        - name: "imageId"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "OK"
          content:
            text/plain:
              schema:
                type: "string"
                format: "byte"
components:
  schemas:
    ExceptionResponse:
      type: "object"
      properties:
        status:
          type: "string"
        code:
          type: "integer"
          format: "int32"
        message:
          type: "string"
          nullable: true
      required:
        - "status"
        - "code"
    AuthRequest:
      type: "object"
      properties:
        email:
          type: "string"
        password:
          type: "string"
      required:
        - "email"
        - "password"
    ImageDependency:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        name:
          type: "string"
        contentType:
          type: "string"
        preview:
          type: "boolean"
      required:
        - "id"
        - "name"
        - "contentType"
        - "preview"
    ProfessionDependency:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        name:
          type: "string"
        description:
          type: "string"
      required:
        - "id"
        - "name"
        - "description"
    PortfolioDependencyInIdentity:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        profession:
          nullable: true
          $ref: "#/components/schemas/ProfessionDependency"
        description:
          type: "string"
          nullable: true
        createdAt:
          type: "string"
          format: "date-time"
      required:
        - "id"
        - "createdAt"
    IdentityResponse:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        authority:
          type: "string"
          enum:
            - "ADMIN"
            - "USER"
        email:
          type: "string"
        status:
          type: "boolean"
        phone:
          type: "string"
        telegram:
          type: "string"
          nullable: true
        whatsapp:
          type: "string"
          nullable: true
        max:
          type: "string"
          nullable: true
        firstname:
          type: "string"
        lastname:
          type: "string"
        patronymic:
          type: "string"
        about:
          type: "string"
          nullable: true
        image:
          nullable: true
          $ref: "#/components/schemas/ImageDependency"
        portfolio:
          nullable: true
          $ref: "#/components/schemas/PortfolioDependencyInIdentity"
      required:
        - "id"
        - "authority"
        - "email"
        - "status"
        - "phone"
        - "firstname"
        - "lastname"
        - "patronymic"
    IdentityRequest:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
          nullable: true
        authority:
          type: "string"
          nullable: true
          enum:
            - "ADMIN"
            - "USER"
        email:
          type: "string"
          nullable: true
        password:
          type: "string"
          nullable: true
        status:
          type: "boolean"
          nullable: true
        phone:
          type: "string"
          nullable: true
        telegram:
          type: "string"
          nullable: true
        whatsapp:
          type: "string"
          nullable: true
        max:
          type: "string"
          nullable: true
        firstname:
          type: "string"
          nullable: true
        lastname:
          type: "string"
          nullable: true
        patronymic:
          type: "string"
          nullable: true
        about:
          type: "string"
          nullable: true